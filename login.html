<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nalanda Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="flex min-h-screen p-4">
  <div class="flex w-full items-center justify-center gap-6">

    <div class="hidden lg:block w-3/5 pr-6">
      <div class="flex items-center justify-between mb-2 border-b border-slate-200">
        <div class="flex items-center gap-6">
          <button onclick="switchTracker('plan')" id="btn-tracker-plan" class="text-lg font-bold text-indigo-600 border-b-2 border-indigo-600 pb-2 transition">📅 Plan Tracker</button>
          <button onclick="switchTracker('sub')" id="btn-tracker-sub" class="text-lg font-bold text-slate-400 hover:text-slate-600 pb-2 transition">✅ Data Submission Tracker</button>
        </div>
        
        <div class="pb-2">
          <input type="month" id="tracker-month" onchange="loadTrackers()" class="border border-slate-300 rounded-md px-2 py-1 text-sm text-slate-600 focus:outline-none focus:ring-1 focus:ring-indigo-500 shadow-sm cursor-pointer">
        </div>
      </div>
      <p id="tracker-label" class="text-xs text-slate-500 mb-3"></p>
      
      <div id="tracker-table-plan" class="bg-white rounded-xl shadow border overflow-auto max-h-[80vh]"></div>
      <div id="tracker-table-sub" class="hidden bg-white rounded-xl shadow border overflow-auto max-h-[80vh]"></div>
    </div>

    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Nalanda Health App</h1>
        <p class="text-gray-500 text-sm mt-2">Login to manage meeting data</p>
      </div>

      <div id="alert" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-medium"></div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username / Block</label>
          <select name="username" id="block-select" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            <option value="" disabled selected>Select User...</option>
            <option value="DISTRICT">DISTRICT</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" placeholder="Enter password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <button type="submit" id="btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition flex justify-center items-center">
          <span>Login</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    // =========================================================================
    // 1. UI SETUP (This runs first so the dropdown ALWAYS works, even if DB fails)
    // =========================================================================
    const blocks = [
      'Asthawan', 'Ben', 'Biharsharif', 'Bind', 'Chandi', 'Ekangarsarai', 'Giriyak', 
      'Harnaut', 'Hilsa', 'Islampur', 'Karai parsurai', 'Katrisarai', 'Nagarnausa', 
      'Noorsarai', 'Parbalpur', 'Rahui', 'Rajgir', 'Sarmera', 'Silao', 'Tharthari'
    ];
    
    const select = document.getElementById('block-select');
    blocks.forEach(b => {
      let opt = document.createElement('option');
      opt.value = b;
      opt.innerText = b;
      select.appendChild(opt);
    });

    // Local Login Routing
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      const alertDiv = document.getElementById('alert');
      const u = this.username.value;
      const p = this.password.value;

      if (u === 'DISTRICT' && p === 'Dio@123') {
        window.location.href = 'dashboard.html';
      } else if (blocks.includes(u) && p === 'Pass@123') {
        window.location.href = `index.html?block=${encodeURIComponent(u)}`;
      } else {
        alertDiv.innerText = "❌ Invalid Username or Password.";
        alertDiv.classList.remove('hidden');
      }
    };

    // Default Date Setup
    window.addEventListener('DOMContentLoaded', () => {
      const today = new Date();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      document.getElementById('tracker-month').value = `${yyyy}-${mm}`;
      
      // Call load trackers after checking Supabase connection
      initializeSupabaseAndLoad();
    });


    // =========================================================================
    // 2. SUPABASE SETUP & ERROR HANDLING
    // =========================================================================
    
    // ⚠️ PASTE YOUR EXACT KEYS HERE. MAKE SURE URL HAS https://
    const SUPABASE_URL = 'https://kaobmfinhtwzquylwlda.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imthb2JtZmluaHR3enF1eWx3bGRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQzODksImV4cCI6MjA4OTY4MDM4OX0.g1ffGihDjrw7s4f7jW8C00G1g1dvoLwWMJUFqSMLD-s';
    let supabase = null;

    function initializeSupabaseAndLoad() {
      // FIX: Define label BEFORE using it
      const label = document.getElementById('tracker-label');
      
      try {
        if(SUPABASE_URL === 'YOUR_SUPABASE_URL_HERE') {
            label.innerHTML = "⚠️ <span class='text-red-600 font-bold'>ERROR:</span> You forgot to paste your Supabase URL in the code!";
            return;
        }
        if(!SUPABASE_URL.startsWith('https://')) {
            label.innerHTML = "⚠️ <span class='text-red-600 font-bold'>ERROR:</span> Your Supabase URL must start with 'https://'";
            return;
        }
        
        // If keys look good, initialize and load data!
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        loadTrackers();

      } catch (err) {
        label.innerHTML = `⚠️ <span class='text-red-600 font-bold'>CRITICAL ERROR:</span> Could not connect to Supabase. Make sure your URL and Key are exactly as they appear in your dashboard.`;
        console.error("Supabase Error:", err);
      }
    }


    // =========================================================================
    // 3. TRACKER LOGIC
    // =========================================================================
    function switchTracker(tab) {
      if (tab === 'plan') {
         document.getElementById('btn-tracker-plan').className = "text-lg font-bold text-indigo-600 border-b-2 border-indigo-600 pb-2 transition";
         document.getElementById('btn-tracker-sub').className = "text-lg font-bold text-slate-400 hover:text-slate-600 pb-2 transition";
         document.getElementById('tracker-table-plan').classList.remove('hidden');
         document.getElementById('tracker-table-sub').classList.add('hidden');
      } else {
         document.getElementById('btn-tracker-sub').className = "text-lg font-bold text-emerald-600 border-b-2 border-emerald-600 pb-2 transition";
         document.getElementById('btn-tracker-plan').className = "text-lg font-bold text-slate-400 hover:text-slate-600 pb-2 transition";
         document.getElementById('tracker-table-sub').classList.remove('hidden');
         document.getElementById('tracker-table-plan').classList.add('hidden');
      }
    }

    const cleanCell = (val) => (!val || val === 'undefined' || val === 'Not yet') ? '-' : val;

    // Format YYYY-MM-DD to DD-MM-YYYY
    const formatDate = (dateStr) => {
        if(!dateStr) return '-';
        const parts = dateStr.split('-');
        if(parts.length !== 3) return dateStr;
        return `${parts[2]}-${parts[1]}-${parts[0]}`; 
    };

    async function loadTrackers() {
      if(!supabase) return; // Prevent crashing if DB didn't connect

      const selectedMonth = document.getElementById('tracker-month').value; 
      document.getElementById('tracker-label').innerText = "Loading data from Supabase...";
      
      let mapPlans = {};
      let mapSubs = {};
      blocks.forEach(b => {
          mapPlans[b] = { ANM1: '-', ANM2: '-', BLTF: '-', Data: '-', BWR1: '-', BWR2: '-', BWR3: '-', BWR4: '-', BWR5: '-' };
          mapSubs[b]  = { ANM1: '-', ANM2: '-', BLTF: '-', Data: '-', BWR1: '-', BWR2: '-', BWR3: '-', BWR4: '-', BWR5: '-' };
      });

      try {
        // Fetch Plans
        const { data: plansData, error: planError } = await supabase
          .from('plans')
          .select('block, meeting_type, proposed_date')
          .like('proposed_date', `${selectedMonth}%`);

        if (planError) throw planError;

        if (plansData) {
          plansData.forEach(r => {
             if(mapPlans[r.block]) {
                 const val = formatDate(r.proposed_date);
                 if (r.meeting_type === 'ANM Review Meeting 1st') mapPlans[r.block].ANM1 = val;
                 else if (r.meeting_type === 'ANM Review Meeting 2nd') mapPlans[r.block].ANM2 = val;
                 else if (r.meeting_type === 'Block Task Force Meeting') mapPlans[r.block].BLTF = val;
                 else if (r.meeting_type === 'Block Data Validation Meeting') mapPlans[r.block].Data = val;
                 else if (r.meeting_type === 'BWR 1st') mapPlans[r.block].BWR1 = val;
                 else if (r.meeting_type === 'BWR 2nd') mapPlans[r.block].BWR2 = val;
                 else if (r.meeting_type === 'BWR 3rd') mapPlans[r.block].BWR3 = val;
                 else if (r.meeting_type === 'BWR 4th') mapPlans[r.block].BWR4 = val;
                 else if (r.meeting_type === 'BWR 5th') mapPlans[r.block].BWR5 = val;
             }
          });
        }

        // Fetch Submissions
        const { data: subsData, error: subError } = await supabase
          .from('submissions')
          .select('block, meeting_type, meeting_date')
          .like('meeting_date', `${selectedMonth}%`);

        if (subError) throw subError;

        if (subsData) {
          subsData.forEach(r => {
             if(mapSubs[r.block]) {
                 const val = '✅ Uploaded';
                 if (r.meeting_type === 'ANM Review Meeting 1st') mapSubs[r.block].ANM1 = val;
                 else if (r.meeting_type === 'ANM Review Meeting 2nd') mapSubs[r.block].ANM2 = val;
                 else if (r.meeting_type === 'Block Task Force Meeting') mapSubs[r.block].BLTF = val;
                 else if (r.meeting_type === 'Block Data Validation Meeting') mapSubs[r.block].Data = val;
                 else if (r.meeting_type === 'BWR 1st') mapSubs[r.block].BWR1 = val;
                 else if (r.meeting_type === 'BWR 2nd') mapSubs[r.block].BWR2 = val;
                 else if (r.meeting_type === 'BWR 3rd') mapSubs[r.block].BWR3 = val;
                 else if (r.meeting_type === 'BWR 4th') mapSubs[r.block].BWR4 = val;
                 else if (r.meeting_type === 'BWR 5th') mapSubs[r.block].BWR5 = val;
             }
          });
        }

        // Render Plans Table
        let pHTML = '<table class="min-w-full text-xs whitespace-nowrap"><thead class="bg-slate-100"><tr><th class="p-2 text-left">Block</th><th class="p-2 text-left">ANM 1</th><th class="p-2 text-left">ANM 2</th><th class="p-2 text-left">BLTF</th><th class="p-2 text-left">Data Val.</th><th class="p-2 text-left">BWR 1</th><th class="p-2 text-left">BWR 2</th><th class="p-2 text-left">BWR 3</th><th class="p-2 text-left">BWR 4</th><th class="p-2 text-left">BWR 5</th></tr></thead><tbody>';
        Object.keys(mapPlans).forEach(b => {
            const r = mapPlans[b];
            pHTML += `<tr class="border-b hover:bg-slate-50"><td class="p-2 font-medium">${b}</td><td class="p-2">${cleanCell(r.ANM1)}</td><td class="p-2">${cleanCell(r.ANM2)}</td><td class="p-2">${cleanCell(r.BLTF)}</td><td class="p-2">${cleanCell(r.Data)}</td><td class="p-2">${cleanCell(r.BWR1)}</td><td class="p-2">${cleanCell(r.BWR2)}</td><td class="p-2">${cleanCell(r.BWR3)}</td><td class="p-2">${cleanCell(r.BWR4)}</td><td class="p-2">${cleanCell(r.BWR5)}</td></tr>`;
        });
        pHTML += '</tbody></table>';
        document.getElementById('tracker-table-plan').innerHTML = pHTML;

        // Render Submissions Table
        let sHTML = '<table class="min-w-full text-xs whitespace-nowrap"><thead class="bg-slate-100"><tr><th class="p-2 text-left">Block</th><th class="p-2 text-left">ANM 1</th><th class="p-2 text-left">ANM 2</th><th class="p-2 text-left">BLTF</th><th class="p-2 text-left">Data Val.</th><th class="p-2 text-left">BWR 1</th><th class="p-2 text-left">BWR 2</th><th class="p-2 text-left">BWR 3</th><th class="p-2 text-left">BWR 4</th><th class="p-2 text-left">BWR 5</th></tr></thead><tbody>';
        const formatSub = (val) => val === '✅ Uploaded' ? `<span class="text-emerald-700 font-bold bg-emerald-100 px-1.5 py-0.5 rounded">✅ Uploaded</span>` : cleanCell(val);
        Object.keys(mapSubs).forEach(b => {
            const r = mapSubs[b];
            sHTML += `<tr class="border-b hover:bg-slate-50"><td class="p-2 font-medium">${b}</td><td class="p-2">${formatSub(r.ANM1)}</td><td class="p-2">${formatSub(r.ANM2)}</td><td class="p-2">${formatSub(r.BLTF)}</td><td class="p-2">${formatSub(r.Data)}</td><td class="p-2">${formatSub(r.BWR1)}</td><td class="p-2">${formatSub(r.BWR2)}</td><td class="p-2">${formatSub(r.BWR3)}</td><td class="p-2">${formatSub(r.BWR4)}</td><td class="p-2">${formatSub(r.BWR5)}</td></tr>`;
        });
        sHTML += '</tbody></table>';
        document.getElementById('tracker-table-sub').innerHTML = sHTML;
        
        const d = new Date(selectedMonth + "-01");
        document.getElementById('tracker-label').innerHTML = `<span class="text-indigo-600 font-bold">● Connected to Database</span> | ${d.toLocaleString('default', {month:'long'})} ${d.getFullYear()} Tracker`;

      } catch (error) {
        document.getElementById('tracker-label').innerHTML = `⚠️ <span class='text-red-600 font-bold'>ERROR FETCHING DATA:</span> Check if your 'plans' and 'submissions' tables exist in Supabase and that RLS is disabled.`;
        console.error("Database Fetch Error:", error);
      }
    }
  </script>
</body>
</html>
